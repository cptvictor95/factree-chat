<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>factree.fm — Listen to YouTube in sync with friends</title>
    <meta
      name="description"
      content="One room, one queue, same second. Create a listening room, share the link, and everyone hears the same YouTube track in real time. No app install."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://factree.fm/" />
    <meta property="og:title" content="factree.fm — Listen to YouTube in sync with friends" />
    <meta
      property="og:description"
      content="One room, one queue, same second. Create a listening room, share the link, and everyone hears the same YouTube track in real time. No app install."
    />
    <meta property="og:image" content="https://factree.fm/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="factree.fm — Listen to YouTube in sync with friends" />
    <meta
      name="twitter:description"
      content="One room, one queue, same second. Create a listening room, share the link, and everyone hears the same YouTube track in real time. No app install."
    />
    <meta name="twitter:image" content="https://factree.fm/og-image.png" />

    <!-- WebApplication schema for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "factree.fm",
        "description": "Synchronized music listening room. One room, one queue, same second. Listen to YouTube in sync with friends, shared queue and real-time chat.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web Browser",
        "url": "https://factree.fm/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
